global:
  environment: production
  imagePullSecrets: []

aiWorker:
  replicaCount: 2
  image:
    repository: registry.internal/ai-worker
    tag: "1.0.0"
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75

cppEngine:
  replicaCount: 2
  image:
    repository: registry.internal/cpp-engine
    tag: "1.0.0"
  resources:
    limits:
      cpu: 4
      memory: 2Gi