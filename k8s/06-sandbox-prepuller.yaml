apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sandbox-image-prepuller
  namespace: eci-sandboxes
spec:
  selector:
    matchLabels:
      app: image-prepuller
  template:
    metadata:
      labels:
        app: image-prepuller
    spec:
      containers:
      # C++ Engine Pre-puller
      - name: cpp-prepuller
        image: eci-cpp-engine:latest
        imagePullPolicy: Always
        command: ["sleep", "infinity"]
        resources:
          requests:
            cpu: "1m"
            memory: "10Mi"
            
      # Python/JS Engine Pre-puller 
      - name: python-prepuller
        image: eci-python-engine:latest
        imagePullPolicy: Always
        command: ["sleep", "infinity"]
        resources:
          requests:
            cpu: "1m"
            memory: "10Mi"
