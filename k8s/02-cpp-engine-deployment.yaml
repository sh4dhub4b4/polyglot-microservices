apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpp-engine
  namespace: ai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cpp-engine
  template:
    metadata:
      labels:
        app: cpp-engine
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: cpp-engine
          image: registry.internal/cpp-engine:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: "1000m"
              memory: "512Mi"
            limits:
              cpu: "4000m"
              memory: "2Gi"