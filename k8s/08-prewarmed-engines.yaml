apiVersion: apps/v1
kind: Deployment
metadata:
  name: prewarmed-cpp-engine
  namespace: eci-sandboxes
  labels:
    app: pre-warmed-sandbox
    env_type: cpp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pre-warmed-sandbox
      env_type: cpp
  template:
    metadata:
      labels:
        app: pre-warmed-sandbox
        env_type: cpp
    spec:
      containers:
        - name: secure-engine
          image: eci-cpp-engine:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
          ports:
            - containerPort: 8080
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "20m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - mountPath: /tmp
              name: ram-disk
      volumes:
        - name: ram-disk
          emptyDir:
            medium: Memory
---
