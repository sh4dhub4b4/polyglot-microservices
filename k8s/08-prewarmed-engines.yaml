# ==========================================
# JVM Engine (Java / Kotlin)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prewarmed-jvm-engine
  namespace: eci-sandboxes
  labels:
    app: pre-warmed-sandbox
    env_type: jvm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pre-warmed-sandbox
      env_type: jvm
  template:
    metadata:
      labels:
        app: pre-warmed-sandbox
        env_type: jvm
    spec:
      containers:
        - name: secure-engine
          image: eci-jvm-engine:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
          ports:
            - containerPort: 8080
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"   # JVM needs more RAM than native engines
              cpu: "500m"
          volumeMounts:
            - mountPath: /tmp
              name: ram-disk
      volumes:
        - name: ram-disk
          emptyDir:
            medium: Memory
